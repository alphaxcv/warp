name: Setup WARP
description: Native WireGuard global + ip rule via Cloudflare API for IP rotate

inputs:
  stack:
    description: "ipv4, ipv6, or dual"
    required: false
    default: dual

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1
        STACK="${{ inputs.stack }}"

        # 1. 仅安装原生网络工具
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends curl jq wireguard-tools iproute2

        # 2. 核心优化：直接通过官方 API 注册 WARP 账户
        sudo tee /usr/local/bin/warp-reg >/dev/null <<'EOF'
        #!/bin/bash
        set -e
        PRIV=$(wg genkey)
        PUB=$(echo "$PRIV" | wg pubkey)

        RESPONSE=$(curl -s -X POST "https://api.cloudflareclient.com/v0a2415/reg" \
          -H "User-Agent: okhttp/3.12.1" \
          -H "Content-Type: application/json" \
          -d "{\"key\":\"$PUB\",\"tos_key\":\"\",\"install_id\":\"\",\"fcm_token\":\"\",\"type\":\"Android\",\"locale\":\"en_US\"}")

        if ! echo "$RESPONSE" | jq -e '.id' >/dev/null; then
          echo "Error: Cloudflare WARP API registration failed." >&2
          echo "$RESPONSE" >&2
          exit 1
        fi

        sudo mkdir -p /var/lib/cloudflare-warp
        echo "$RESPONSE" | sudo tee /var/lib/cloudflare-warp/api_reg.json >/dev/null
        echo "$PRIV" | sudo tee /var/lib/cloudflare-warp/wg_private.key >/dev/null
        EOF

        # 3. 解析 API 返回的 JSON，动态生成 WireGuard 配置文件
        sudo tee /usr/local/bin/warp-wg-build >/dev/null <<'B'
        #!/bin/bash
        set -e
        STACK="${1:-dual}"
        REG_FILE="/var/lib/cloudflare-warp/api_reg.json"
        KEY_FILE="/var/lib/cloudflare-warp/wg_private.key"

        PRIV=$(cat "$KEY_FILE")
        V4=$(jq -r '.config.interface.addresses.v4 // "172.16.0.2/32"' "$REG_FILE")
        V6=$(jq -r '.config.interface.addresses.v6 // "2606:4700:110::1/128"' "$REG_FILE")
        EP=$(jq -r '.config.peers[0].endpoint.v4 // "engage.cloudflareclient.com:2408"' "$REG_FILE")
        PUB_PEER=$(jq -r '.config.peers[0].public_key // "bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo="' "$REG_FILE")

        case "$STACK" in
          ipv4) A="AllowedIPs = 0.0.0.0/0" ;;
          ipv6) A="AllowedIPs = ::/0" ;;
          *)    A="AllowedIPs = 0.0.0.0/0, ::/0" ;;
        esac

        sudo tee /etc/wireguard/warp.conf >/dev/null <<CFG
        [Interface]
        PrivateKey = $PRIV
        Address = $V4, $V6
        DNS = 1.1.1.1
        MTU = 1280

        [Peer]
        PublicKey = $PUB_PEER
        $A
        Endpoint = $EP
        CFG
        B

        # 4. 保活路由：在启动前注入，防止 Runner 断网卡死
        sudo tee /usr/local/bin/warp-rule >/dev/null <<'U'
        #!/bin/bash
        MAIN_IP=$(ip -4 route get 8.8.8.8 | grep -oP 'src \K\S+' || true)
        if [ -n "$MAIN_IP" ]; then
          sudo ip rule del from "$MAIN_IP" table main priority 100 2>/dev/null || true
          sudo ip rule add from "$MAIN_IP" table main priority 100
        fi
        U

        # 5. IP 轮换逻辑
        sudo tee /usr/local/bin/warp-rotate >/dev/null <<'R'
        #!/bin/bash
        set -e
        STACK="${1:-dual}"
        OLD=$(curl -4s --connect-timeout 5 https://api.ipify.org || echo "N/A")
        
        sudo wg-quick down warp 2>/dev/null || true
        sudo warp-reg
        sudo warp-wg-build "$STACK"
        sudo warp-rule
        sudo wg-quick up warp
        
        NEW=$(curl -4s --connect-timeout 5 https://api.ipify.org || echo "N/A")
        [ "$NEW" != "N/A" ] && [ "$NEW" != "$OLD" ]
        R

        # 6. 赋权并初始化运行
        sudo chmod +x /usr/local/bin/warp-reg /usr/local/bin/warp-wg-build /usr/local/bin/warp-rule /usr/local/bin/warp-rotate

        sudo warp-reg
        sudo warp-wg-build "$STACK"
        sudo warp-rule
        sudo wg-quick up warp

        # 7. 最终连通性与 WARP 状态验证
        curl -4sf --connect-timeout 5 https://cloudflare.com/cdn-cgi/trace | grep -qE '^warp=(on|plus)$'

        echo "IPv4: $(curl -4s --connect-timeout 5 https://api.ipify.org || echo N/A)"
        echo "IPv6: $(curl -6s --connect-timeout 5 https://api64.ipify.org || echo N/A)"
