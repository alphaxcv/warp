name: 'Setup WARP (proxy mode)'
description: 'Install Cloudflare WARP in proxy mode (socks5 on 127.0.0.1:40000). The runner never enters the tunnel so GitHub log streaming stays LIVE; the browser opts in via socks5 so its exit IP can rotate via "registration new".'

inputs:
  stack:
    description: 'Kept for compatibility; proxy mode ignores it.'
    required: false
    default: 'dual'

runs:
  using: composite
  steps:
    - name: Install and connect WARP
      shell: bash
      run: |
        set -e

        run_step() {
          local label=$1
          shift
          echo ">>> $label"
          if ! "$@" >/dev/null 2>&1; then
            echo ">>> FAILED: $label"
            exit 1
          fi
        }

        echo ">>> Installing cloudflare-warp..."
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq cloudflare-warp

        run_step "Starting warp-svc" sudo systemctl enable --now warp-svc
        sleep 3

        run_step "Registering" sudo warp-cli --accept-tos registration new
        run_step "Setting proxy mode (port 40000)" sudo warp-cli --accept-tos mode proxy
        run_step "Setting proxy port" sudo warp-cli --accept-tos proxy port 40000
        run_step "Connecting" sudo warp-cli --accept-tos connect
        sleep 5

        WARP_IP=$(curl -s -x socks5h://127.0.0.1:40000 \
          --connect-timeout 5 --max-time 12 --retry 3 --retry-delay 1 \
          https://api.ipify.org || true)
        echo ">>> WARP exit IP: ${WARP_IP:-N/A}"
