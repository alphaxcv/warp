name: 'Setup WARP'
description: 'Install and connect Cloudflare WARP on GitHub Actions (plain warp mode, registration new works so IP can rotate)'

inputs:
  stack:
    description: 'IP stack: ipv4 / ipv6 / dual'
    required: false
    default: 'dual'

runs:
  using: composite
  steps:
    - name: Install and connect WARP
      shell: bash
      run: |
        set -e

        echo "Installing cloudflare-warp..."
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update
        sudo apt-get install -y cloudflare-warp

        # Make sure the warp daemon is running, otherwise warp-cli hangs forever
        sudo systemctl enable --now warp-svc 2>/dev/null || (sudo warp-svc >/dev/null 2>&1 &)
        sleep 5

        echo "Registering..."
        sudo warp-cli --accept-tos registration new

        if [ "${{ inputs.stack }}" == "ipv4" ]; then
          sudo warp-cli --accept-tos tunnel ip add-range ::0/0 2>/dev/null || true
        elif [ "${{ inputs.stack }}" == "ipv6" ]; then
          sudo warp-cli --accept-tos tunnel ip add-range 0.0.0.0/0 2>/dev/null || true
        fi

        echo "Connecting..."
        sudo warp-cli --accept-tos connect
        sleep 8

        echo "==============================="
        echo "IP:"
        get_ip() {
            local url_primary=$1
            local url_backup=$2
            local flag=$3
            result=$(timeout 10 curl -s $flag --connect-timeout 3 --max-time 8 --retry 3 --retry-delay 1 -A Mozilla https://$url_primary 2>/dev/null)
            if [ -z "$result" ]; then
                result=$(timeout 10 curl -s $flag --connect-timeout 3 --max-time 8 --retry 3 --retry-delay 1 https://$url_backup 2>/dev/null)
            fi
            if [ -z "$result" ]; then echo "N/A"; else echo "$result"; fi
        }
        echo "IPv4: $(get_ip "api-ipv4.ip.sb/geoip" "speed.cloudflare.com/meta" "-4")"
        echo "IPv6: $(get_ip "api-ipv6.ip.sb/geoip" "speed.cloudflare.com/meta" "-6")"
