name: 'Setup WARP (full tunnel, logs preserved)'
description: 'Install Cloudflare WARP in client full-tunnel mode, but exclude the runner''s own traffic from the tunnel via an ip rule (same trick fscarmen uses) so GitHub log streaming stays LIVE. IP can rotate via "registration new".'

inputs:
  stack:
    description: 'IP stack: ipv4 / ipv6 / dual'
    required: false
    default: 'dual'

runs:
  using: composite
  steps:
    - name: Install and connect WARP
      shell: bash
      run: |
        set -e

        echo "Installing cloudflare-warp..."
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update
        sudo apt-get install -y cloudflare-warp

        # Make sure the warp daemon is running, otherwise warp-cli hangs forever
        sudo systemctl enable --now warp-svc 2>/dev/null || (sudo warp-svc >/dev/null 2>&1 &)
        sleep 5

        # Capture the runner's real NIC IP BEFORE the tunnel comes up.
        LAN=$(ip route get 1.1.1.1 | grep -oP 'src \K\S+' | head -1)
        echo "Runner LAN IP: $LAN"
        echo "$LAN" | sudo tee /tmp/warp_lan_ip >/dev/null

        echo "Registering..."
        sudo warp-cli --accept-tos registration new
        # plain "warp" mode (NOT warp+doh): keeps "registration new" able to rotate the exit IP

        if [ "${{ inputs.stack }}" == "ipv4" ]; then
          sudo warp-cli --accept-tos tunnel ip add-range ::0/0 2>/dev/null || true
        elif [ "${{ inputs.stack }}" == "ipv6" ]; then
          sudo warp-cli --accept-tos tunnel ip add-range 0.0.0.0/0 2>/dev/null || true
        fi

        echo "Connecting (full tunnel)..."
        sudo warp-cli --accept-tos connect
        sleep 8

        # KEY: keep the runner's own traffic (the GitHub log-upload agent, bound to $LAN)
        # OUT of the WARP tunnel so logs stream live. Browser traffic is NOT sourced from
        # $LAN, so it still goes through WARP and its IP can rotate.
        # priority 100 = evaluated before WARP's own routing rules.
        sudo ip -4 rule del from $LAN lookup main priority 100 2>/dev/null || true
        sudo ip -4 rule add from $LAN lookup main priority 100
        echo "ip rules:"
        ip rule show | head -n 20

        echo "==============================="
        echo "WARP exit IP (browser/script path, tunneled):"
        curl -s --connect-timeout 5 --max-time 12 --retry 3 --retry-delay 1 https://api.ipify.org || echo "N/A"
        echo ""
        echo "Runner direct IP (log path, bypassing tunnel):"
        curl -s --interface "$LAN" --connect-timeout 5 --max-time 12 --retry 3 --retry-delay 1 https://api.ipify.org || echo "N/A"
        echo ""
