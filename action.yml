name: 'Setup WARP'
description: '在 GitHub Actions 上安装并连接 Cloudflare WARP（普通 warp 模式，registration new 有效，IP 可轮换）'

inputs:
  stack:
    description: 'IP 栈：ipv4 / ipv6 / dual'
    required: false
    default: 'dual'

runs:
  using: composite
  steps:
    - name: Install and connect WARP
      shell: bash
      run: |
        set -e

        echo "===== 安装 cloudflare-warp ====="
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update
        sudo apt-get install -y cloudflare-warp

        echo "===== 注册（新账号）====="
        sudo warp-cli --accept-tos registration new

        # 普通 warp 全隧道模式（默认即是）。按需限定 IP 栈：
        if [ "${{ inputs.stack }}" == "ipv4" ]; then
          sudo warp-cli --accept-tos tunnel ip add-range ::0/0 2>/dev/null || true
        elif [ "${{ inputs.stack }}" == "ipv6" ]; then
          sudo warp-cli --accept-tos tunnel ip add-range 0.0.0.0/0 2>/dev/null || true
        fi

        echo "===== 连接（带重试）====="
        connected=0
        for attempt in $(seq 1 8); do
          echo "connect 第 $attempt/8 次..."
          sudo warp-cli --accept-tos disconnect 2>/dev/null || true
          sudo warp-cli --accept-tos connect
          if timeout 30 bash -c 'until sudo warp-cli status 2>/dev/null | grep -q "Connected"; do sleep 1; done'; then
            connected=1
            echo "WARP 已连接（第 $attempt 次）"
            break
          fi
          echo "第 $attempt 次连接失败，重试..."
          sleep $((attempt * 3))
        done
        if [ $connected -ne 1 ]; then
          echo "WARP 连接失败"
          exit 1
        fi

        echo "===== 出口 IP ====="
        curl -s --max-time 20 https://api.ipify.org && echo " <- WARP 出口 IP"
        curl -s --max-time 15 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true
