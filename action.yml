name: 'Setup WARP (proxy mode)'
description: 'Install Cloudflare WARP in proxy mode (socks5 on 127.0.0.1:40000). The runner never enters the tunnel so GitHub log streaming stays LIVE; the browser opts in via socks5 so its exit IP can rotate via "registration new".'

inputs:
  stack:
    description: 'Kept for compatibility; proxy mode ignores it.'
    required: false
    default: 'dual'

runs:
  using: composite
  steps:
    - name: Install and connect WARP
      shell: bash
      run: |
        set -e

        echo "Installing cloudflare-warp..."
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update
        sudo apt-get install -y cloudflare-warp

        # Make sure the warp daemon is running, otherwise warp-cli hangs forever
        sudo systemctl enable --now warp-svc 2>/dev/null || (sudo warp-svc >/dev/null 2>&1 &)
        sleep 2

        echo "Registering..."
        sudo warp-cli --accept-tos registration new

        # proxy mode: WARP only opens a local socks5 proxy, it does NOT touch system routing.
        # -> runner's own traffic (incl. log upload) stays direct  => logs are LIVE.
        # -> browser opts in via socks5://127.0.0.1:40000           => its IP exits through WARP and can rotate.
        echo "Setting proxy mode (port 40000)..."
        sudo warp-cli --accept-tos mode proxy
        sudo warp-cli --accept-tos proxy port 40000

        echo "Connecting..."
        sudo warp-cli --accept-tos connect
        sleep 2

        echo "==============================="
        echo "WARP exit IP (browser path, via socks5 proxy):"
        curl -s -x socks5h://127.0.0.1:40000 --connect-timeout 5 --max-time 12 --retry 3 --retry-delay 1 https://api.ipify.org || echo "N/A"
        echo ""
