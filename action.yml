name: Setup WARP
description: fscarmen WireGuard global + ip rule + warp-cli registration for IP rotate

inputs:
  stack:
    description: "ipv4, ipv6, or dual"
    required: false
    default: dual

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1
        STACK="${{ inputs.stack }}"

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends curl gpg jq wireguard-tools iproute2
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(. /etc/os-release && echo $VERSION_CODENAME) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cloudflare-warp

        sudo tee /usr/local/bin/warp-reg >/dev/null <<'EOF'
        #!/bin/bash
        systemctl start warp-svc 2>/dev/null; sleep 3
        warp-cli --accept-tos registration delete 2>/dev/null || true
        warp-cli --accept-tos registration new
        warp-cli --accept-tos tunnel protocol set WireGuard
        warp-cli --accept-tos rotate-keys
        systemctl stop warp-svc 2>/dev/null
        EOF

        sudo tee /usr/local/bin/warp-wg-build >/dev/null <<'B'
        #!/bin/bash
        STACK="${1:-dual}"
        LAN=$(ip route get 192.168.193.10 | grep -oP 'src \K\S+')
        PRIV=$(jq -r '.secret_key' /var/lib/cloudflare-warp/reg.json)
        V4=$(jq -r '.interface.v4 // "172.16.0.2"' /var/lib/cloudflare-warp/conf.json)
        V6=$(jq -r '.interface.v6 // "2606:4700:110::1"' /var/lib/cloudflare-warp/conf.json)
        EP=$(jq -r '.endpoints[0].v4 // "engage.cloudflareclient.com"' /var/lib/cloudflare-warp/conf.json)
        case "$STACK" in
          ipv4) A="AllowedIPs = 0.0.0.0/0" ;;
          ipv6) A="AllowedIPs = ::/0" ;;
          *)    A="AllowedIPs = 0.0.0.0/0, ::/0" ;;
        esac
        tee /etc/wireguard/warp.conf >/dev/null <<CFG
        [Interface]
        PrivateKey = $PRIV
        Address = ${V4}/32, ${V6}/128
        PostUp = ip -4 rule add from $LAN lookup main
        PostDown = ip -4 rule delete from $LAN lookup main
        DNS = off
        MTU = 1280
        [Peer]
        PublicKey = bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
        $A
        Endpoint = ${EP}:2408
        CFG
        sed -i 's/^[ ]\+//g' /etc/wireguard/warp.conf
        B

        sudo tee /usr/local/bin/warp-rotate >/dev/null <<R
        #!/bin/bash
        set -e
        STACK="$STACK"
        OLD=\$(curl -4s --connect-timeout 5 https://api.ipify.org)
        wg-quick down warp 2>/dev/null || true
        warp-reg
        warp-wg-build "\$STACK"
        wg-quick up warp
        NEW=\$(curl -4s --connect-timeout 5 https://api.ipify.org)
        curl -4sf --connect-timeout 5 https://cloudflare.com/cdn-cgi/trace | grep -qE '^warp=(on|plus)$'
        [ -n "\$NEW" ] && [ "\$NEW" != "\$OLD" ]
        R

        sudo chmod +x /usr/local/bin/warp-reg /usr/local/bin/warp-wg-build /usr/local/bin/warp-rotate

        sudo warp-reg
        sudo warp-wg-build "$STACK"
        sudo wg-quick up warp
        curl -4sf --connect-timeout 5 https://cloudflare.com/cdn-cgi/trace | grep -qE '^warp=(on|plus)$'

        echo "IPv4: $(curl -4s --connect-timeout 5 https://api.ipify.org || echo N/A)"
        echo "IPv6: $(curl -6s --connect-timeout 5 https://api64.ipify.org || echo N/A)"
